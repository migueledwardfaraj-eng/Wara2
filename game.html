<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Card Table — Game</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600;700&family=Inter:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="wrap">
  <div class="brand">
    <h1 id="gameTitle">Game</h1>
    <div class="user-chip" id="userChip"></div>
  </div>

  <!-- SETUP PANEL (4-player games) -->
  <div class="panel" id="setupPanel">
    <p class="eyebrow" id="setupEyebrow">Setup</p>
    <h2 style="margin-top:0;">Who's playing?</h2>

    <div class="team-label">Team A</div>
    <div class="team-sub">Partners sit across from each other</div>
    <label for="p1">Player 1</label>
    <input type="text" id="p1" placeholder="Name">
    <label for="p2">Player 2 (partner)</label>
    <input type="text" id="p2" placeholder="Name">

    <div class="team-label" style="margin-top:18px;">Team B</div>
    <div class="team-sub">Partners sit across from each other</div>
    <label for="p3">Player 1</label>
    <input type="text" id="p3" placeholder="Name">
    <label for="p4">Player 2 (partner)</label>
    <input type="text" id="p4" placeholder="Name">

    <div class="error" id="setupError"></div>
    <button class="full" id="startBtn" style="margin-top:18px;">Start game</button>
  </div>

  <!-- SETUP PANEL (Tawle, 2 players) -->
  <div class="panel" id="tawleSetupPanel" style="display:none;">
    <p class="eyebrow">Setup</p>
    <h2 style="margin-top:0;">Who's playing?</h2>
    <label for="tawleP1">Player 1</label>
    <input type="text" id="tawleP1" placeholder="Name">
    <label for="tawleP2">Player 2</label>
    <input type="text" id="tawleP2" placeholder="Name">
    <div class="error" id="tawleSetupError"></div>
    <button class="full" id="tawleStartBtn" style="margin-top:18px;">Start</button>
  </div>

  <!-- SCORING PANEL (4-player games) -->
  <div class="panel" id="scoringPanel" style="display:none;">
    <p class="eyebrow" id="scoringEyebrow">In progress</p>
    <h2 style="margin-top:0;" id="scoringHeading">Scoreboard</h2>

    <div class="ledger">
      <table>
        <thead>
          <tr id="ledgerHeadRow">
            <th style="width:14%;"></th>
          </tr>
        </thead>
        <tbody id="ledgerBody"></tbody>
        <tfoot>
          <tr class="total-row" id="ledgerTotalRow">
            <td>Total</td>
          </tr>
        </tfoot>
      </table>
    </div>

    <div class="score-input-row" id="roundInputRow"></div>
    <div class="error" id="roundError"></div>
    <button class="full" id="addRoundBtn" style="margin-top:14px;">Add round</button>
  </div>

  <!-- FIREWORKS OVERLAY -->
  <canvas id="fireworksCanvas" style="position:fixed; inset:0; width:100vw; height:100vh; pointer-events:none; z-index:999; display:none;"></canvas>

  <!-- WINNER BANNER -->
  <div class="banner" id="winnerBanner" style="display:none;">
    <div class="trophy">🏆</div>
    <h3 id="winnerText"></h3>
    <div id="winnerSub" style="font-size:0.85rem; opacity:0.8;"></div>
    <div class="bottom-nav" style="margin-top:14px;">
      <button class="btn" id="saveResultBtn">Save to history</button>
      <a class="btn secondary" href="app.html">Back to games</a>
    </div>
    <div class="error" id="saveError"></div>
  </div>

  <!-- TAWLE PANEL -->
  <div class="panel" id="tawlePanel" style="display:none;">
    <p class="eyebrow">Tawle</p>
    <h2 style="margin-top:0;" id="tawleHeading">Roll the dice</h2>

    <div class="dice-area">
      <div class="die" id="die1"></div>
      <div class="die" id="die2"></div>
    </div>
    <div class="dice-sum" id="diceSum">—</div>
    <div class="dice-double" id="diceDouble"></div>

    <button class="full" id="rollBtn" style="margin-top:10px;">🎲 Roll dice</button>

    <div style="margin-top:22px; border-top:1px solid var(--line); padding-top:18px;">
      <p style="font-size:0.85rem; opacity:0.8; margin:0 0 10px;">
        When the game is decided, declare the winner:
      </p>
      <div class="bottom-nav">
        <button class="btn" id="declareWinBtn1"></button>
        <button class="btn" id="declareWinBtn2"></button>
      </div>
    </div>
  </div>

  <div class="bottom-nav" style="margin-top:10px;">
    <a class="btn secondary" href="app.html">← Back to games</a>
  </div>
</div>

<script src="common.js"></script>
<script>
const session = requireLogin();
if (session) renderUserChip(session);

const params = new URLSearchParams(window.location.search);
const type = params.get("type"); // "400" | "tarneeb" | "likha" | "tawle"

const RULES = {
  "tarneeb": { label: "Tarneeb", threshold: 31, allowNegative: true, perPlayer: false, tarneebBidMode: true },
  "400":     { label: "400",     threshold: 41, allowNegative: true, perPlayer: true, bidMode: true },
  "likha":   { label: "Likha",   threshold: 101, allowNegative: false, perPlayer: true, roundSum: 36 }
};

// 400 bid -> points table (minimum bid is 2)
const BID_POINTS = { 2: 2, 3: 3, 4: 4, 5: 10, 6: 12, 7: 14, 8: 16, 9: 27, 10: 30 };

// Tarneeb bid options: 7-12 tricks, or 26 ("bid all 13")
const TARNEEB_BIDS = [7, 8, 9, 10, 11, 12, 26];

let state = {
  type,
  players: [],   // [p1, p2, p3, p4]  A: [0,1]  B: [2,3]
  rounds: [],    // Tarneeb: [{a: n, b: n}]   400/Likha: [[n1,n2,n3,n4]]
  totals: { a: 0, b: 0 },       // Tarneeb
  playerTotals: [0, 0, 0, 0],   // 400/Likha
  finished: false,
  winningTeam: null,
  finalScore: null
};

init();

function init() {
  if (!type || (!RULES[type] && type !== "tawle")) {
    document.getElementById("gameTitle").textContent = "Unknown game";
    document.querySelector(".wrap").innerHTML += '<div class="panel"><p>Unknown game type. <a href="app.html">Go back</a>.</p></div>';
    return;
  }

  if (type === "tawle") {
    document.getElementById("gameTitle").textContent = "Tawle";
    document.getElementById("setupPanel").style.display = "none";
    document.getElementById("tawleSetupPanel").style.display = "";
    document.getElementById("tawleStartBtn").addEventListener("click", startTawle);
    return;
  }

  const r = RULES[type];
  document.getElementById("gameTitle").textContent = r.label;
  document.getElementById("setupEyebrow").textContent = r.label + " setup";
  document.getElementById("scoringEyebrow").textContent = r.bidMode
    ? `${r.label} · ends at ${r.threshold}+ · bid 2–10, points per table, fail = negative`
    : r.tarneebBidMode
    ? `${r.label} · ends at ${r.threshold}+ · bid 7-12 or 26 (all 13), success = tricks won, fail = lose bid`
    : r.roundSum !== undefined
    ? `${r.label} · ends at ${r.threshold}+ · add only · round must total ${r.roundSum}`
    : r.label + ` · ends at ${r.threshold}+ · ${r.allowNegative ? "+/− allowed" : "add only"}`;
  document.getElementById("startBtn").addEventListener("click", startGame);
  document.getElementById("addRoundBtn").addEventListener("click", addRound);
  document.getElementById("saveResultBtn").addEventListener("click", saveResult);
}

// ---------- 4-player games ----------
function startGame() {
  const errEl = document.getElementById("setupError");
  errEl.textContent = "";
  const names = ["p1","p2","p3","p4"].map(id => document.getElementById(id).value.trim());
  if (names.some(n => !n)) {
    errEl.textContent = "Enter all 4 player names.";
    return;
  }
  state.players = names;

  document.getElementById("setupPanel").style.display = "none";
  document.getElementById("scoringPanel").style.display = "";

  document.getElementById("scoringHeading").textContent = `${names[0]}/${names[1]} vs ${names[2]}/${names[3]}`;

  buildLedgerHeader();
  buildRoundInputs();
  renderLedger();
}

function buildLedgerHeader() {
  const r = RULES[type];
  const names = state.players;
  const headRow = document.getElementById("ledgerHeadRow");
  const totalRow = document.getElementById("ledgerTotalRow");

  // clear existing extra cells (keep first th/td)
  while (headRow.children.length > 1) headRow.removeChild(headRow.lastChild);
  while (totalRow.children.length > 1) totalRow.removeChild(totalRow.lastChild);

  if (r.perPlayer) {
    names.forEach((name, i) => {
      const th = document.createElement("th");
      th.textContent = name;
      headRow.appendChild(th);

      const td = document.createElement("td");
      td.id = `total-p${i}`;
      td.textContent = "0";
      totalRow.appendChild(td);
    });
  } else {
    const thA = document.createElement("th");
    thA.textContent = `${names[0]} & ${names[1]}`;
    headRow.appendChild(thA);

    const thB = document.createElement("th");
    thB.textContent = `${names[2]} & ${names[3]}`;
    headRow.appendChild(thB);

    const tdA = document.createElement("td");
    tdA.id = "totalA";
    tdA.textContent = "0";
    totalRow.appendChild(tdA);

    const tdB = document.createElement("td");
    tdB.id = "totalB";
    tdB.textContent = "0";
    totalRow.appendChild(tdB);
  }
}

function buildRoundInputs() {
  const r = RULES[type];
  const names = state.players;
  const row = document.getElementById("roundInputRow");
  row.innerHTML = "";

  if (r.tarneebBidMode) {
    row.classList.remove("cols-4");
    row.style.gridTemplateColumns = "1fr 1fr 1fr";

    const bidOptions = TARNEEB_BIDS.map(b =>
      `<option value="${b}">${b === 26 ? "26 (all 13)" : b}</option>`
    ).join("");

    const teamDiv = document.createElement("div");
    teamDiv.className = "field";
    teamDiv.innerHTML = `
      <label for="bidTeam">Bidding team</label>
      <select id="bidTeam">
        <option value="a">${names[0]} & ${names[1]}</option>
        <option value="b">${names[2]} & ${names[3]}</option>
      </select>
    `;

    const bidDiv = document.createElement("div");
    bidDiv.className = "field";
    bidDiv.innerHTML = `
      <label for="tarneebBid">Bid</label>
      <select id="tarneebBid">${bidOptions}</select>
    `;

    const tricksDiv = document.createElement("div");
    tricksDiv.className = "field";
    tricksDiv.innerHTML = `
      <label for="tricksWon">Tricks won by bidder</label>
      <input type="number" id="tricksWon" inputmode="numeric" placeholder="0" min="0" max="13">
    `;

    row.appendChild(teamDiv);
    row.appendChild(bidDiv);
    row.appendChild(tricksDiv);
  } else if (r.bidMode) {
    row.classList.add("cols-4");
    names.forEach((name, i) => {
      const div = document.createElement("div");
      div.className = "field";
      const options = Object.keys(BID_POINTS).map(b =>
        `<option value="${b}">${b} (${BID_POINTS[b]} pts)</option>`
      ).join("");
      div.innerHTML = `
        <label for="bid-p${i}">${name}</label>
        <select id="bid-p${i}">
          <option value="0">No bid</option>
          ${options}
        </select>
        <div style="display:flex; gap:6px; margin-top:6px;">
          <label style="margin:0; display:flex; align-items:center; gap:4px; font-size:0.78rem;">
            <input type="radio" name="result-p${i}" value="made" checked style="width:auto;"> Made
          </label>
          <label style="margin:0; display:flex; align-items:center; gap:4px; font-size:0.78rem;">
            <input type="radio" name="result-p${i}" value="failed" style="width:auto;"> Failed
          </label>
        </div>
      `;
      row.appendChild(div);
    });
  } else if (r.perPlayer) {
    row.classList.add("cols-4");
    names.forEach((name, i) => {
      const div = document.createElement("div");
      div.className = "field";
      div.innerHTML = `
        <label for="round-p${i}">${name}</label>
        <input type="number" id="round-p${i}" inputmode="numeric" placeholder="0" ${r.allowNegative ? "" : 'min="0"'}>
      `;
      row.appendChild(div);
    });
  } else {
    row.classList.remove("cols-4");
    const divA = document.createElement("div");
    divA.className = "field";
    divA.innerHTML = `
      <label for="roundA">${names[0]} & ${names[1]} score</label>
      <input type="number" id="roundA" inputmode="numeric" placeholder="0">
    `;
    const divB = document.createElement("div");
    divB.className = "field";
    divB.innerHTML = `
      <label for="roundB">${names[2]} & ${names[3]} score</label>
      <input type="number" id="roundB" inputmode="numeric" placeholder="0">
    `;
    row.appendChild(divA);
    row.appendChild(divB);
  }
}

function addRound() {
  if (state.finished) return;
  const r = RULES[type];
  const errEl = document.getElementById("roundError");
  errEl.textContent = "";

  if (r.tarneebBidMode) {
    const bidTeam = document.getElementById("bidTeam").value; // "a" or "b"
    const bid = Number(document.getElementById("tarneebBid").value);
    const tricksRaw = document.getElementById("tricksWon").value;
    const tricksWon = tricksRaw === "" ? NaN : Number(tricksRaw);

    if (Number.isNaN(tricksWon) || tricksWon < 0 || tricksWon > 13) {
      errEl.textContent = "Enter tricks won by the bidding team (0-13).";
      return;
    }

    const requiredTricks = bid === 26 ? 13 : bid;
    const success = tricksWon >= requiredTricks;

    let bidderScore, opponentScore;
    if (success) {
      bidderScore = (bid === 26) ? 26 : tricksWon;
      opponentScore = 0;
    } else {
      bidderScore = -bid;
      opponentScore = 13 - tricksWon;
    }

    const a = bidTeam === "a" ? bidderScore : opponentScore;
    const b = bidTeam === "a" ? opponentScore : bidderScore;

    state.rounds.push({ a, b, bidTeam, bid, tricksWon, success });
    state.totals.a += a;
    state.totals.b += b;

    document.getElementById("tricksWon").value = "";
  } else if (r.bidMode) {
    const values = [];
    for (let i = 0; i < 4; i++) {
      const bid = Number(document.getElementById(`bid-p${i}`).value);
      const result = document.querySelector(`input[name="result-p${i}"]:checked`).value;
      let pts = 0;
      if (bid > 0) {
        pts = BID_POINTS[bid];
        if (result === "failed") pts = -pts;
      }
      values.push(pts);
    }

    state.rounds.push(values);
    values.forEach((v, i) => state.playerTotals[i] += v);

    for (let i = 0; i < 4; i++) {
      document.getElementById(`bid-p${i}`).value = "0";
      document.querySelector(`input[name="result-p${i}"][value="made"]`).checked = true;
    }
  } else if (r.perPlayer) {
    const values = [];
    for (let i = 0; i < 4; i++) {
      const raw = document.getElementById(`round-p${i}`).value;
      const v = raw === "" ? 0 : Number(raw);
      if (Number.isNaN(v)) {
        errEl.textContent = "Enter valid numbers.";
        return;
      }
      if (!r.allowNegative && v < 0) {
        errEl.textContent = `${r.label} only allows positive (add) scores.`;
        return;
      }
      values.push(v);
    }

    if (r.roundSum !== undefined) {
      const sum = values.reduce((s, v) => s + v, 0);
      if (sum !== r.roundSum) {
        errEl.textContent = `Round total must equal ${r.roundSum} (currently ${sum}).`;
        return;
      }
    }

    state.rounds.push(values);
    values.forEach((v, i) => state.playerTotals[i] += v);

    for (let i = 0; i < 4; i++) document.getElementById(`round-p${i}`).value = "";
  } else {
    const aRaw = document.getElementById("roundA").value;
    const bRaw = document.getElementById("roundB").value;
    const a = aRaw === "" ? 0 : Number(aRaw);
    const b = bRaw === "" ? 0 : Number(bRaw);

    if (Number.isNaN(a) || Number.isNaN(b)) {
      errEl.textContent = "Enter valid numbers.";
      return;
    }
    if (!r.allowNegative && (a < 0 || b < 0)) {
      errEl.textContent = `${r.label} only allows positive (add) scores.`;
      return;
    }

    state.rounds.push({ a, b });
    state.totals.a += a;
    state.totals.b += b;

    document.getElementById("roundA").value = "";
    document.getElementById("roundB").value = "";
  }

  renderLedger();
  checkGameEnd();
}

function renderLedger() {
  const r = RULES[type];
  const body = document.getElementById("ledgerBody");

  if (r.perPlayer) {
    body.innerHTML = state.rounds.map((rnd, i) => `
      <tr>
        <td class="row-num">${i + 1}</td>
        ${rnd.map(v => `<td>${v > 0 ? "+" : ""}${v}</td>`).join("")}
      </tr>
    `).join("");
    state.playerTotals.forEach((v, i) => {
      document.getElementById(`total-p${i}`).textContent = v;
    });
  } else {
    body.innerHTML = state.rounds.map((rnd, i) => {
      let note = "";
      if (rnd.bidTeam) {
        const bidLabel = rnd.bid === 26 ? "26 (all 13)" : rnd.bid;
        const teamName = rnd.bidTeam === "a" ? "Team A" : "Team B";
        note = `<div style="font-size:0.7rem; opacity:0.6; margin-top:2px;">
          ${teamName} bid ${bidLabel}, won ${rnd.tricksWon} — ${rnd.success ? "made" : "failed"}
        </div>`;
      }
      return `
        <tr>
          <td class="row-num">${i + 1}</td>
          <td>${rnd.a > 0 ? "+" : ""}${rnd.a}${rnd.bidTeam === "a" ? note : ""}</td>
          <td>${rnd.b > 0 ? "+" : ""}${rnd.b}${rnd.bidTeam === "b" ? note : ""}</td>
        </tr>
      `;
    }).join("");
    document.getElementById("totalA").textContent = state.totals.a;
    document.getElementById("totalB").textContent = state.totals.b;
  }
}

function checkGameEnd() {
  const r = RULES[type];
  const names = state.players;

  if (r.perPlayer) {
    // Team A = players 0,1 ; Team B = players 2,3
    // A team wins as soon as EITHER of its players individually reaches the threshold.
    const teamAReached = state.playerTotals[0] >= r.threshold || state.playerTotals[1] >= r.threshold;
    const teamBReached = state.playerTotals[2] >= r.threshold || state.playerTotals[3] >= r.threshold;

    if (!teamAReached && !teamBReached) return;

    let winningTeam;
    if (teamAReached && teamBReached) {
      // Both teams crossed in the same round — compare each team's best (max) player score
      const aBest = Math.max(state.playerTotals[0], state.playerTotals[1]);
      const bBest = Math.max(state.playerTotals[2], state.playerTotals[3]);
      if (aBest === bBest) return; // tie at/above threshold: keep playing
      winningTeam = aBest > bBest ? 0 : 1;
    } else {
      winningTeam = teamAReached ? 0 : 1;
    }

    state.finished = true;
    const winners = winningTeam === 0 ? [names[0], names[1]] : [names[2], names[3]];
    const winnerIdxs = winningTeam === 0 ? [0, 1] : [2, 3];
    const finalScore = Math.max(state.playerTotals[winnerIdxs[0]], state.playerTotals[winnerIdxs[1]]);
    state.winningTeam = winners;
    state.finalScore = finalScore;

    disableInputs();

    document.getElementById("winnerText").textContent = `${winners.join(" & ")} win!`;
    document.getElementById("winnerSub").textContent =
      `${names.map((n, i) => `${n}: ${state.playerTotals[i]}`).join(" · ")} (reached ${r.threshold}+)`;
    document.getElementById("winnerBanner").style.display = "";
    launchFireworks();

  } else {
    const aWins = state.totals.a >= r.threshold;
    const bWins = state.totals.b >= r.threshold;

    if (!aWins && !bWins) return;

    let winningTeam;
    if (aWins && bWins) {
      if (state.totals.a === state.totals.b) return; // tie: keep playing
      winningTeam = state.totals.a > state.totals.b ? 0 : 1;
    } else {
      winningTeam = aWins ? 0 : 1;
    }

    state.finished = true;
    const winners = winningTeam === 0 ? [names[0], names[1]] : [names[2], names[3]];
    const score = winningTeam === 0 ? state.totals.a : state.totals.b;
    state.winningTeam = winners;
    state.finalScore = score;

    disableInputs();

    document.getElementById("winnerText").textContent = `${winners.join(" & ")} win!`;
    document.getElementById("winnerSub").textContent =
      `Final score ${state.totals.a} – ${state.totals.b} (reached ${r.threshold}+)`;
    document.getElementById("winnerBanner").style.display = "";
    launchFireworks();
  }
}

function disableInputs() {
  document.getElementById("addRoundBtn").disabled = true;
  document.querySelectorAll("#roundInputRow input, #roundInputRow select").forEach(el => el.disabled = true);
}

async function saveResult() {
  const btn = document.getElementById("saveResultBtn");
  const errEl = document.getElementById("saveError");
  errEl.textContent = "";
  btn.disabled = true;
  btn.textContent = "Saving…";

  const r = RULES[type];
  const record = {
    type,
    date: new Date().toISOString(),
    players: state.players,
    teams: [[state.players[0], state.players[1]], [state.players[2], state.players[3]]],
    rounds: state.rounds,
    totals: r.perPlayer ? state.playerTotals : state.totals,
    winningTeam: state.winningTeam,
    finalScore: state.finalScore,
    recordedBy: session.username
  };

  try {
    await appendGameToHistory(record);
    btn.textContent = "Saved ✓";
  } catch (e) {
    errEl.textContent = e.message;
    btn.disabled = false;
    btn.textContent = "Save to history";
  }
}

// ---------- Tawle ----------
let tawlePlayers = ["", ""];

function startTawle() {
  const errEl = document.getElementById("tawleSetupError");
  const p1 = document.getElementById("tawleP1").value.trim();
  const p2 = document.getElementById("tawleP2").value.trim();
  if (!p1 || !p2) {
    errEl.textContent = "Enter both player names.";
    return;
  }
  tawlePlayers = [p1, p2];
  document.getElementById("tawleSetupPanel").style.display = "none";
  document.getElementById("tawlePanel").style.display = "";
  document.getElementById("tawleHeading").textContent = `${p1} vs ${p2}`;
  buildDice();

  document.getElementById("rollBtn").addEventListener("click", rollDice);
  document.getElementById("declareWinBtn1").textContent = `${p1} wins`;
  document.getElementById("declareWinBtn2").textContent = `${p2} wins`;
  document.getElementById("declareWinBtn1").addEventListener("click", () => declareTawleWin(p1));
  document.getElementById("declareWinBtn2").addEventListener("click", () => declareTawleWin(p2));
}

const PIP_LAYOUTS = {
  1: [4],
  2: [0, 8],
  3: [0, 4, 8],
  4: [0, 2, 6, 8],
  5: [0, 2, 4, 6, 8],
  6: [0, 2, 3, 5, 6, 8]
};

function buildDice() {
  ["die1", "die2"].forEach(id => {
    const die = document.getElementById(id);
    die.innerHTML = "";
    for (let i = 0; i < 9; i++) {
      const pip = document.createElement("div");
      pip.className = "pip";
      die.appendChild(pip);
    }
  });
  setDieValue("die1", 1);
  setDieValue("die2", 1);
}

function setDieValue(id, value) {
  const die = document.getElementById(id);
  const pips = die.querySelectorAll(".pip");
  pips.forEach(p => p.classList.remove("on"));
  PIP_LAYOUTS[value].forEach(idx => pips[idx].classList.add("on"));
}

function rollDice() {
  const d1 = document.getElementById("die1");
  const d2 = document.getElementById("die2");
  d1.classList.add("rolling");
  d2.classList.add("rolling");

  const v1 = 1 + Math.floor(Math.random() * 6);
  const v2 = 1 + Math.floor(Math.random() * 6);

  setTimeout(() => {
    setDieValue("die1", v1);
    setDieValue("die2", v2);
    d1.classList.remove("rolling");
    d2.classList.remove("rolling");

    document.getElementById("diceSum").textContent = `${v1} + ${v2} = ${v1 + v2}`;
    document.getElementById("diceDouble").textContent =
      v1 === v2 ? "Double! Plays as double the value." : "";
  }, 480);
}

async function declareTawleWin(winnerName) {
  const btn1 = document.getElementById("declareWinBtn1");
  const btn2 = document.getElementById("declareWinBtn2");
  btn1.disabled = true;
  btn2.disabled = true;
  const clickedBtn = winnerName === tawlePlayers[0] ? btn1 : btn2;
  const otherBtn = clickedBtn === btn1 ? btn2 : btn1;
  clickedBtn.textContent = "Saving…";

  const loser = tawlePlayers.find(p => p !== winnerName);

  const record = {
    type: "tawle",
    date: new Date().toISOString(),
    players: tawlePlayers,
    winner: winnerName,
    loser: loser,
    recordedBy: session.username
  };

  try {
    await appendGameToHistory(record);
    document.getElementById("tawleHeading").textContent = `${winnerName} won! ✓ Saved to history`;
    clickedBtn.textContent = "Saved ✓";
    otherBtn.style.display = "none";
    launchFireworks();
  } catch (e) {
    btn1.disabled = false;
    btn2.disabled = false;
    clickedBtn.textContent = winnerName === tawlePlayers[0] ? `${tawlePlayers[0]} wins` : `${tawlePlayers[1]} wins`;
    alert("Could not save: " + e.message);
  }
}

// ---------- Fireworks celebration ----------
function launchFireworks() {
  const canvas = document.getElementById("fireworksCanvas");
  const reduceMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
  if (reduceMotion) return;

  canvas.style.display = "block";
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  const ctx = canvas.getContext("2d");

  const colors = ["#d4af37", "#e8cf7a", "#f4ecd8", "#b1473e", "#6fae8d"];
  let particles = [];

  function spawnBurst() {
    const x = canvas.width * (0.2 + Math.random() * 0.6);
    const y = canvas.height * (0.15 + Math.random() * 0.35);
    const color = colors[Math.floor(Math.random() * colors.length)];
    const count = 36;
    for (let i = 0; i < count; i++) {
      const angle = (Math.PI * 2 * i) / count;
      const speed = 2 + Math.random() * 3;
      particles.push({
        x, y,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        life: 60 + Math.random() * 20,
        age: 0,
        color
      });
    }
  }

  let burstsLeft = 5;
  let frame = 0;
  const burstInterval = 22;

  function tick() {
    frame++;
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    if (burstsLeft > 0 && frame % burstInterval === 0) {
      spawnBurst();
      burstsLeft--;
    }

    particles.forEach(p => {
      p.age++;
      p.x += p.vx;
      p.y += p.vy;
      p.vy += 0.04; // gravity
      const alpha = Math.max(0, 1 - p.age / p.life);
      ctx.globalAlpha = alpha;
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, 2.5, 0, Math.PI * 2);
      ctx.fill();
    });
    ctx.globalAlpha = 1;

    particles = particles.filter(p => p.age < p.life);

    if (burstsLeft > 0 || particles.length > 0) {
      requestAnimationFrame(tick);
    } else {
      canvas.style.display = "none";
      ctx.clearRect(0, 0, canvas.width, canvas.height);
    }
  }

  requestAnimationFrame(tick);
}
</script>
